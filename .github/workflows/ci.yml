name: Build miniforge
on:
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Miniforge3-${{ matrix.OS_NAME }}-${{ matrix.ARCH }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            ARCH: x86_64
            TARGET_PLATFORM: win-64
            OS_NAME: "Windows"

          # - os: macos-latest
          #   ARCH: arm64
          #   TARGET_PLATFORM: osx-arm64
          #   OS_NAME: "MacOSX"

          # - os: macos-latest
          #   ARCH: x86_64
          #   TARGET_PLATFORM: osx-64
          #   OS_NAME: "MacOSX"

          # - os: ubuntu-latest
          #   ARCH: aarch64
          #   TARGET_PLATFORM: linux-aarch64
          #   DOCKER_ARCH: arm64/v8
          #   DOCKERIMAGE: condaforge/linux-anvil-aarch64
          #   OS_NAME: "Linux"
          #   # Reduce the test matrix because the builds timeouts on emulated architectures
          #   # The time consuming operation is an attempt a full solve of conda/mamba/boa
          #   # for as a compatibility
          #   # xref https://github.com/conda-forge/miniforge/pull/361
          #   TEST_IMAGE_NAMES: "ubuntu:24.04"

          # - os: ubuntu-latest
          #   ARCH: x86_64
          #   TARGET_PLATFORM: linux-64
          #   DOCKER_ARCH: amd64
          #   DOCKERIMAGE: condaforge/linux-anvil-cos7-x86_64
          #   OS_NAME: "Linux"

          # - os: ubuntu-latest
          #   ARCH: ppc64le
          #   TARGET_PLATFORM: linux-ppc64le
          #   DOCKER_ARCH: ppc64le
          #   DOCKERIMAGE: condaforge/linux-anvil-ppc64le
          #   OS_NAME: "Linux"
          #   # Reduce the test matrix because the builds timeouts on emulated architectures
          #   # The time consuming operation is an attempt a full solve of conda/mamba/boa
          #   # for as a compatibility
          #   # xref https://github.com/conda-forge/miniforge/pull/361
          #   TEST_IMAGE_NAMES: "ubuntu:24.04"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          miniforge-version: "latest"
          use-mamba: true
        if: ${{ ! contains(matrix.OS_NAME, 'Linux') }}

      - name: Prepare certificates (macOS)
        if: startsWith(matrix.TARGET_PLATFORM, 'osx-') && github.event_name != 'pull_request'
        env:
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_INSTALLER_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_INSTALLER_PASSWORD }}
          APPLE_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_APPLICATION_BASE64 }}
          APPLE_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_APPLICATION_PASSWORD }}
          APPLE_TEMP_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_TEMP_KEYCHAIN_PASSWORD }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.MACOS_NOTARIZATION_ISSUER_ID }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.MACOS_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_AUTHKEY_BASE64: ${{ secrets.MACOS_NOTARIZATION_AUTHKEY_BASE64 }}
        run: |
          if [[ "${APPLE_NOTARIZATION_KEY_ID:-}" == "" ]]; then
            exit 0  # skip if secrets are not populated
          fi

          # This script will export APPLE_SIGNING_IDENTITY and APPLE_NOTARIZATION_IDENTITY
          source scripts/osx_prepare_certificates.sh

          # These will be needed by the build.sh script
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "APPLE_NOTARIZATION_IDENTITY=$APPLE_NOTARIZATION_IDENTITY" >> $GITHUB_ENV
          echo "APPLE_NOTARIZATION_ISSUER_ID=$APPLE_NOTARIZATION_ISSUER_ID" >> $GITHUB_ENV
          echo "APPLE_NOTARIZATION_KEY_ID=$APPLE_NOTARIZATION_KEY_ID" >> $GITHUB_ENV
          echo "APPLE_NOTARIZATION_AUTHKEY_PATH=$APPLE_NOTARIZATION_AUTHKEY_PATH" >> $GITHUB_ENV

      - name: Enable PKGs (macOS)
        if: startsWith(matrix.TARGET_PLATFORM, 'osx-')
        run: |
          # This env var is read in construct.yaml; we need 'all' to build both SH and PKG
          echo "MINIFORGE_INSTALLER_TYPE=all" >> $GITHUB_ENV

      - name: Build and test miniforge
        env:
          ARCH: ${{ matrix.ARCH }}
          OS_NAME: ${{ matrix.OS_NAME }}
          DOCKERIMAGE: ${{ matrix.DOCKERIMAGE }}
          DOCKER_ARCH: ${{ matrix.DOCKER_ARCH }}
          TARGET_PLATFORM: ${{ matrix.TARGET_PLATFORM }}
          TEST_IMAGE_NAMES: ${{ matrix.TEST_IMAGE_NAMES }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            export MINIFORGE_VERSION=${GITHUB_REF##*/};
          fi
          if [[ "$OS_NAME" == "Linux" ]]; then
            export EXT=sh
            bash build_miniforge.sh;
          fi
          if [[ "$OS_NAME" == "MacOSX" ]]; then
            export EXT=sh
            bash build_miniforge_osx.sh;
          fi
          if [[ "$OS_NAME" == "Windows" ]]; then
            export EXT=exe
            echo "WINDIR:$WINDIR"
            source "${CONDA}"/Scripts/activate;
            source build_miniforge_win.sh;
          fi
          # Copy for latest release
          cp build/Miniforge3-*-$OS_NAME-$ARCH.$EXT build/Miniforge3-$OS_NAME-$ARCH.$EXT
          if [[ "$OS_NAME" == "MacOSX" ]]; then
            # Copy PKGs too, and alias -MacOSX- to -Darwin-
            cp build/Miniforge3-*-$OS_NAME-$ARCH.$EXT build/Miniforge3-Darwin-$ARCH.$EXT
            cp build/Miniforge3-*-$OS_NAME-$ARCH.pkg build/Miniforge3-$OS_NAME-$ARCH.pkg
            cp build/Miniforge3-*-$OS_NAME-$ARCH.pkg build/Miniforge3-Darwin-$ARCH.pkg
          fi
          ls -alh build
        shell: bash

      - name: Azure login
        if: startsWith(matrix.TARGET_PLATFORM, 'win-') 
          # && github.event_name != 'pull_request'
          # && startsWith(github.ref, 'refs/tags/')
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: >-
            {
              "clientId": "${{ secrets.WINDOWS_SIGNING_AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.WINDOWS_SIGNING_AZURE_CLIENT_SECRET_VALUE }}",
              "subscriptionId": "${{ secrets.WINDOWS_SIGNING_AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.WINDOWS_SIGNING_AZURE_TENANT_ID }}"
            }

      - name: Sign files with Artifact Signing
        if: startsWith(matrix.TARGET_PLATFORM, 'win-') 
          # && github.event_name != 'pull_request'
          # && startsWith(github.ref, 'refs/tags/')
        uses: azure/artifact-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        with:
          endpoint: ${{ secrets.WINDOWS_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.WINDOWS_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.WINDOWS_SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\build
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signatures
        if: startsWith(matrix.TARGET_PLATFORM, 'win-') 
          # && github.event_name != 'pull_request'
          # && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $exitCode = 0
          foreach ($executable in (Get-ChildItem "build/*.exe")) {
            Write-Host "******************************************"
            Write-Host $executable.Name
            Write-Host "******************************************"
            $sig = Get-AuthenticodeSignature -FilePath $executable.FullName
            $sig | Format-List * | Out-String | Write-Host
            if ($sig.Status -ne 'Valid') {
              Write-Error "CRITICAL: Signature verification failed for $($executable.Name)!"
              $exitCode = 1
            }
          }
          exit $exitCode

      - name: Regenerate SHA256 files after signing
        if: startsWith(matrix.TARGET_PLATFORM, 'win-') 
          # && github.event_name != 'pull_request'
          # && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          foreach ($executable in (Get-ChildItem "build/*.exe")) {
            $hashObject = Get-FileHash $executable.FullName
            "$($hashObject.Hash.ToLower())  $(executable.Name)" | Out-File -FilePath "$($executable.FullName).sha256"
            Write-Host "SHA256($($executable.Name)): $($hashObject.Hash.ToLower())"
          }

      - name: Upload miniforge to Github artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: build/Miniforge3-${{ matrix.OS_NAME }}-${{ matrix.ARCH }}*
          name: Miniforge3-${{ matrix.OS_NAME }}-${{ matrix.ARCH }}

      - name: Upload miniforge to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/M*forge*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/')
